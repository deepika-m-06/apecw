<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Student Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#007BFF,#00C6FF);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:420px;
    background:#fff;
    border-radius:12px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.header{
    display:flex;
    align-items:center;
    margin-bottom:25px;
}

.logo{
    width:70px;
    height:70px;
    margin-right:15px;
}

.title h2{
    color:#003366;
    font-size:22px;
    margin-bottom:5px;
}

.title h3{
    color:#666;
    font-size:16px;
    font-weight:normal;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:6px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.forgot{
    text-align:center;
    margin-top:15px;
}

.forgot a{
    color:#007BFF;
    text-decoration:none;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:gray;
    font-size:13px;
}

</style>

</head>

<body>

<div class="login-box">

    <div class="header">

        <img src="logo.png" alt="College Logo" class="logo">

        <div class="title">
            <h2>Adhiparasakthi Engineering College</h2>
            <h3>Student Login Portal</h3>
        </div>

    </div>

    <form>

        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="forgot">
        <a href="#">Forgot Password?</a>
    </div>

    <div class="footer">
        <hr style="margin:15px 0;">
        © 2026 Adhiparasakthi Engineering College
    </div>

</div>

</body>
</html>
